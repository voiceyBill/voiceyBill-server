name: Stale Issues and PRs

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - name: Mark stale items
        uses: actions/stale@v10
        with:
          stale-issue-message: >-
            This issue has been marked as stale because it has been inactive for 30 days.
            Please comment if this is still relevant.
          stale-pr-message: >-
            This pull request has been marked as stale because it has been inactive for 30 days.
            Please update it to keep it active.
          close-issue-message: >-
            Closing this stale issue due to inactivity. Reopen if this still needs attention.
          close-pr-message: >-
            Closing this stale pull request due to inactivity. Reopen if you want to continue.
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security,help wanted
          exempt-pr-labels: pinned,security
          days-before-stale: 30
          days-before-close: 10
